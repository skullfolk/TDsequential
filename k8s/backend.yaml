apiVersion: apps/v1
kind: Deployment
metadata:
  name: quant-backend
  namespace: tdsequential          # ← namespace แยกออกจาก app อื่น
  labels:
    app: quant-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quant-backend
  template:
    metadata:
      labels:
        app: quant-backend
    spec:
      imagePullSecrets:          # ← ต้องเป็น camelCase
        - name: ghcr-pull-secret
      containers:
        - name: quant-backend
          image: ghcr.io/skullfolk/quant-backend:v1.0.1-aca6a8a
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: "sqlite:////data/quant_report.db"
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: quant-secrets
                  key: TELEGRAM_BOT_TOKEN
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: quant-secrets
                  key: TELEGRAM_CHAT_ID
          volumeMounts:
            - name: db-storage
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: quant-db-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: quant-db-pvc
  namespace: tdsequential
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: quant-backend-svc
  namespace: tdsequential
spec:
  selector:
    app: quant-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
