apiVersion: apps/v1
kind: Deployment
metadata:
  name: quant-frontend
  namespace: tdsequential          # ← namespace แยกออกจาก app อื่น
  labels:
    app: quant-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quant-frontend
  template:
    metadata:
      labels:
        app: quant-frontend
    spec:
      imagePullSecrets:          # ← ต้องเป็น camelCase และรูปแบบ list
        - name: ghcr-pull-secret
      containers:
        - name: quant-frontend
          image: ghcr.io/skullfolk/quant-frontend:v1.0.6-f2c6e0c
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: quant-frontend-svc
  namespace: tdsequential
spec:
  selector:
    app: quant-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
