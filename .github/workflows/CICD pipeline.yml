name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository_owner }}/quant-backend
  FRONTEND_IMAGE: ${{ github.repository_owner }}/quant-frontend

jobs:
  # 1. CodeQL Scan
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: python, javascript # Python for backend, JS for frontend

    - name: Autobuild
      uses: github/codeql-action/autobuild@v4

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:python,javascript"

  # 2. Detect Changes
  changes:
    name: Detect File Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'k8s/backend.yaml'
              - '.github/workflows/CICD pipeline.yml'
            frontend:
              - 'frontend/**'
              - 'k8s/frontend.yaml'
              - '.github/workflows/CICD pipeline.yml'

  # 3. Build & Push Backend (Only if changed)
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    needs: [analyze, changes]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.backend == 'true' }}
    permissions:
      contents: read
      packages: write
      security-events: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Image Tag
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="v1.0.${{ github.run_number }}-${SHORT_SHA}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "BACKEND_ID=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}" >> $GITHUB_ENV

      - name: Build local backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          load: true
          tags: ${{ env.BACKEND_ID }}:${{ steps.meta.outputs.tag }}

      - name: Run Trivy scanner (Backend)
        uses: aquasecurity/trivy-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: '${{ env.BACKEND_ID }}:${{ steps.meta.outputs.tag }}'
          format: 'sarif'
          output: 'trivy-backend.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Push Backend Image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.BACKEND_ID }}:${{ steps.meta.outputs.tag }},${{ env.BACKEND_ID }}:latest

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-backend.sarif'

  # 4. Build & Push Frontend (Only if changed)
  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    needs: [analyze, changes]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.frontend == 'true' }}
    permissions:
      contents: read
      packages: write
      security-events: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Image Tag
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="v1.0.${{ github.run_number }}-${SHORT_SHA}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "FRONTEND_ID=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}" >> $GITHUB_ENV

      - name: Build local frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          load: true
          tags: ${{ env.FRONTEND_ID }}:${{ steps.meta.outputs.tag }}

      - name: Run Trivy scanner (Frontend)
        uses: aquasecurity/trivy-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: '${{ env.FRONTEND_ID }}:${{ steps.meta.outputs.tag }}'
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Push Frontend Image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.FRONTEND_ID }}:${{ steps.meta.outputs.tag }},${{ env.FRONTEND_ID }}:latest

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-frontend.sarif'

  # 5. Update Local Kubernetes Manifests
  update-manifests:
    name: Deploy (Update Local K8s YAML)
    runs-on: ubuntu-latest
    # Wait for either backend or frontend to finish
    needs: [changes, build-backend, build-frontend]
    if: |
      always() && 
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      (needs.build-backend.result == 'success' || needs.build-frontend.result == 'success')
    permissions:
      contents: write # Need write permission to commit back to the repo
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Ensure we have the latest token to push back
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Update Backend Image Tag
        if: needs.changes.outputs.backend == 'true'
        env:
          NEW_BACKEND: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ needs.build-backend.outputs.image_tag }}
        run: |
          echo "Target Backend Image: ${NEW_BACKEND}"
          sed -i -E "s|image: .*quant-backend.*|image: ${NEW_BACKEND}|g" k8s/backend.yaml

      - name: Update Frontend Image Tag
        if: needs.changes.outputs.frontend == 'true'
        env:
          NEW_FRONTEND: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ needs.build-frontend.outputs.image_tag }}
        run: |
          echo "Target Frontend Image: ${NEW_FRONTEND}"
          sed -i -E "s|image: .*quant-frontend.*|image: ${NEW_FRONTEND}|g" k8s/frontend.yaml
          
      - name: Commit and Push to Repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/
          if git diff --staged --quiet; then
            echo "No changes to commit. Image tag was identical."
          else
            git commit -m "chore: update k8s manifests to (run context ${{ github.run_number }}) [skip ci]"
            git push origin main
          fi
